<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#059669">
  <meta name="description" content="Suivi de calories minimaliste, 100 % local, alimenté par des JSON générés par Claude.">
  <title>Kalo — Suivi calories</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
      </svg>
      <h1>Kalo</h1>
    </div>
    <button id="btn-settings" class="icon-btn" aria-label="Réglages">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <nav class="tabs" role="tablist" aria-label="Période">
    <button class="tab" role="tab" data-view="day" aria-selected="true">Jour</button>
    <button class="tab" role="tab" data-view="week" aria-selected="false">Semaine</button>
    <button class="tab" role="tab" data-view="month" aria-selected="false">Mois</button>
    <button class="tab" role="tab" data-view="year" aria-selected="false">Année</button>
  </nav>

  <div class="period-nav">
    <button id="btn-prev" class="icon-btn" aria-label="Période précédente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button id="btn-today" class="period-label" title="Revenir à aujourd'hui"></button>
    <button id="btn-next" class="icon-btn" aria-label="Période suivante">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <main id="view" class="view" aria-live="polite"></main>

  <div class="fab-wrap">
    <button id="btn-add" class="fab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      Ajouter un repas
    </button>
  </div>

  <!-- Modale d'ajout -->
  <dialog id="dlg-add" class="sheet" aria-labelledby="dlg-add-title">
    <form method="dialog" class="sheet-inner" id="form-add">
      <div class="sheet-head">
        <h2 id="dlg-add-title">Ajouter un repas</h2>
        <button type="button" class="icon-btn" data-close aria-label="Fermer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <ol class="steps">
        <li>Envoie ta photo à Claude (boutons ci-dessous)</li>
        <li>Copie le JSON de sa réponse</li>
        <li>Colle-le ici et valide</li>
      </ol>

      <button type="button" id="btn-photo" class="btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        Prendre la photo → partager à Claude
      </button>
      <button type="button" id="btn-share-photo" class="btn-secondary" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
        Envoyer la photo à Claude
      </button>
      <button type="button" id="btn-open-claude" class="btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        Ouvrir Claude avec le prompt pré-rempli
      </button>
      <button type="button" id="btn-copy-prompt" class="link-btn">Copier seulement le prompt</button>
      <input type="file" id="photo-input" accept="image/*" capture="environment" hidden>

      <label class="field">
        <span>JSON du repas</span>
        <textarea id="json-input" rows="8" required spellcheck="false" autocomplete="off"
          placeholder='{"meal":"dejeuner","items":[{"name":"Riz basmati","mass_g":180,"kcal":234,"protein_g":5,"carbs_g":50,"fat_g":1}]}'></textarea>
      </label>
      <p id="json-status" class="helper" role="status"></p>

      <div class="field-row">
        <label class="field">
          <span>Date (si absente du JSON)</span>
          <input type="date" id="fallback-date">
        </label>
        <label class="field">
          <span>Repas (si absent du JSON)</span>
          <select id="fallback-meal">
            <option value="petit-dejeuner">Petit-déjeuner</option>
            <option value="dejeuner" selected>Déjeuner</option>
            <option value="diner">Dîner</option>
            <option value="collation">Collation</option>
          </select>
        </label>
      </div>

      <button type="submit" id="btn-submit-add" class="btn-primary" disabled>Ajouter</button>
    </form>
  </dialog>

  <!-- Modale réglages -->
  <dialog id="dlg-settings" class="sheet" aria-labelledby="dlg-settings-title">
    <div class="sheet-inner">
      <div class="sheet-head">
        <h2 id="dlg-settings-title">Réglages</h2>
        <button type="button" class="icon-btn" data-close aria-label="Fermer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <label class="field">
        <span>Objectif quotidien (kcal)</span>
        <input type="number" id="goal-input" min="0" step="50" inputmode="numeric">
      </label>

      <div class="settings-actions">
        <button type="button" id="btn-export" class="btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Exporter mes données
        </button>
        <button type="button" id="btn-import" class="btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Importer une sauvegarde
        </button>
        <input type="file" id="import-file" accept="application/json,.json" hidden>
        <button type="button" id="btn-clear" class="btn-danger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          Tout effacer
        </button>
      </div>
      <p class="helper">Les données sont stockées uniquement dans ce navigateur (localStorage). Pense à exporter régulièrement.</p>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
